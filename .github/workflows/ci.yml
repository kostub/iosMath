name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  spm:
    name: Swift Package Manager
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: swift build

      - name: Test
        run: swift test
